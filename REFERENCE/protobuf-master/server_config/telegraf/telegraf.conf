[agent]
  interval = "100ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  hostname = "fsae-server"
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = ["fsae/telemetry"]

  data_format = "xpath_protobuf"
  xpath_protobuf_import_paths = ["/etc/telegraf/protos"]
  xpath_protobuf_file = "fsae_telemetry.proto"
  xpath_protobuf_type = "fsae.TelemetryFrame"
  xpath_allow_empty_selection = true

  [[inputs.mqtt_consumer.xpath]]
    metric_name = "'telemetry'"
    # --- int 类型（必须用 fields_int）---
    [inputs.mqtt_consumer.xpath.fields_int]
      timestamp_ms = "(//timestamp_ms)[1]"
      seq = "//frame_id"
      ready_to_drive = "(//ready_to_drive)[1]"
      vcu_status = "(//vcu_status)[1]"
      battery_soc = "//battery_soc"
      max_cell_voltage = "//max_cell_voltage"
      min_cell_voltage = "//min_cell_voltage"
      max_cell_voltage_no = "//max_cell_voltage_no"
      min_cell_voltage_no = "//min_cell_voltage_no"
      max_temp = "//max_temp"
      min_temp = "//min_temp"
      max_temp_no = "//max_temp_no"
      min_temp_no = "//min_temp_no"
      battery_fault_code = "//battery_fault_code"
      ivt_current_ma = "//ivt_telemetry/current_ma"
      ivt_voltage_u1_mv = "//ivt_telemetry/voltage_u1_mv"
      ivt_energy_wh = "//ivt_telemetry/energy_wh"
      ivt_current_state = "//ivt_telemetry/current_state"
      ivt_voltage_u1_state = "//ivt_telemetry/voltage_u1_state"
      ivt_energy_state = "//ivt_telemetry/energy_state"
      ivt_power_w = "//ivt_telemetry/power_w"
      energy_meter_source = "//energy_meter/source"
      energy_meter_current_ma = "//energy_meter/current_ma"
      energy_meter_voltage_mv = "//energy_meter/voltage_mv"
      energy_meter_energy_wh = "//energy_meter/energy_wh"
      energy_meter_power_w = "//energy_meter/power_w"
      energy_meter_status = "//energy_meter/status"
      energy_meter_msg_counter = "//energy_meter/msg_counter"
      vehicle_mode = "(//vehicle_state/driving_mode)[1]"
      fast_vehicle_mode = "(//fast_telemetry/driving_mode)[1]"
      gps_speed_kmh = "//motion/gps_speed_kmh"
    # --- float / bool 类型（用 number() 或比较表达式）---
    [inputs.mqtt_consumer.xpath.fields]
      hv_voltage = "number(//hv_voltage)"
      hv_current = "sum(//hv_current)"
      apps_position = "number(//apps_position)"
      brake_pressure = "number(//brake_pressure)"
      steering_angle = "number(//steering_angle)"
      battery_temp_max = "number(//battery_temp_max)"
      accel_x_g = "number(//motion/accel_x_g)"
      accel_y_g = "number(//motion/accel_y_g)"
      accel_z_g = "number(//motion/accel_z_g)"
      yaw_rate_dps = "number(//motion/yaw_rate_dps)"
      yaw_deg = "number(//motion/yaw_deg)"
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fsae/telemetry"]
  data_format = "xpath_protobuf"
  xpath_protobuf_file = "fsae_telemetry.proto"
  xpath_protobuf_import_paths = ["/etc/telegraf/protos"]
  xpath_protobuf_type = "fsae.TelemetryFrame"
  xpath_allow_empty_selection = true

  [[inputs.mqtt_consumer.xpath]]
    metric_name = "'motor_state'"
    metric_selection = "//vehicle_state/motors"

    [inputs.mqtt_consumer.xpath.tags]
      position = "position"
    [inputs.mqtt_consumer.xpath.fields_int]
      rpm = "rpm"
      torque_nm = "torque_nm"
      power_w = "power_w"
      motor_temp_dc = "motor_temp_dc"
      inverter_temp_dc = "inverter_temp_dc"
      motor_error = "motor_error"
      igbt_temp_dc = "igbt_temp_dc"
      diagnostic_number = "diagnostic_number"
      logic_state = "logic_state"
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fsae/telemetry"]
  data_format = "xpath_protobuf"
  xpath_protobuf_file = "fsae_telemetry.proto"
  xpath_protobuf_import_paths = ["/etc/telegraf/protos"]
  xpath_protobuf_type = "fsae.TelemetryFrame"
  xpath_allow_empty_selection = true

  [[inputs.mqtt_consumer.xpath]]
    metric_name = "'thermal_summary'"
    metric_selection = "//thermal_summary/sensors"

    [inputs.mqtt_consumer.xpath.tags]
      position = "position"
    [inputs.mqtt_consumer.xpath.fields_int]
      min_temp_centi_c = "min_temp_centi_c"
      max_temp_centi_c = "max_temp_centi_c"
      avg_temp_centi_c = "avg_temp_centi_c"
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fsae/telemetry"]
  data_format = "xpath_protobuf"
  xpath_protobuf_file = "fsae_telemetry.proto"
  xpath_protobuf_import_paths = ["/etc/telegraf/protos"]
  xpath_protobuf_type = "fsae.TelemetryFrame"
  xpath_allow_empty_selection = true

  [[inputs.mqtt_consumer.xpath]]
    metric_name = "'alarm_state'"
    metric_selection = "//alarms"

    [inputs.mqtt_consumer.xpath.tags]
      alarm_id = "alarm_id"
    [inputs.mqtt_consumer.xpath.fields_int]
      severity = "severity"
    [inputs.mqtt_consumer.xpath.fields]
      message = "string(message)"
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fsae/telemetry"]
  data_format = "xpath_protobuf"
  xpath_protobuf_file = "fsae_telemetry.proto"
  xpath_protobuf_import_paths = ["/etc/telegraf/protos"]
  xpath_protobuf_type = "fsae.TelemetryFrame"
  xpath_allow_empty_selection = true

  [[inputs.mqtt_consumer.xpath]]
    metric_name = "'bms_data'"
    metric_selection = "//modules" 
    
    [inputs.mqtt_consumer.xpath.tags]
      module_id = "module_id"
    # 映射所有电芯电压 (v_01 ~ v_23) 和 温度 (t_1 ~ t_8)
    [inputs.mqtt_consumer.xpath.fields_int]
      v_01 = "v01"
      v_02 = "v02"
      v_03 = "v03"
      v_04 = "v04"
      v_05 = "v05"
      v_06 = "v06"
      v_07 = "v07"
      v_08 = "v08"
      v_09 = "v09"
      v_10 = "v10"
      v_11 = "v11"
      v_12 = "v12"
      v_13 = "v13"
      v_14 = "v14"
      v_15 = "v15"
      v_16 = "v16"
      v_17 = "v17"
      v_18 = "v18"
      v_19 = "v19"
      v_20 = "v20"
      v_21 = "v21"
      v_22 = "v22"
      v_23 = "v23"

      t_1 = "t1"
      t_2 = "t2"
      t_3 = "t3"
      t_4 = "t4"
      t_5 = "t5"
      t_6 = "t6"
      t_7 = "t7"
      t_8 = "t8"
[[processors.starlark]]
  namepass = ["telemetry"]
  source = '''
def apply(metric):
    if "hv_voltage" in metric.fields and str(metric.fields["hv_voltage"]) != "nan":
        metric.fields["hv_voltage_dv"] = int(metric.fields["hv_voltage"] * 10 + 0.5)
    if "hv_current" in metric.fields and str(metric.fields["hv_current"]) != "nan":
        metric.fields["hv_current_ma"] = int(metric.fields["hv_current"] * 1000)
    if "battery_temp_max" in metric.fields and str(metric.fields["battery_temp_max"]) != "nan":
        metric.fields["battery_temp_max_dc"] = int(metric.fields["battery_temp_max"] * 10 + 0.5)
    return metric
'''
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "fsae_db"
  skip_database_creation = false
